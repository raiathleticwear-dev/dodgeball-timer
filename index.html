<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDBF Official Dodgeball Timer</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #ffffff;
            --match-color: #00e5ff;
            --set-color: #ffea00;
            --pause-color: #ff3d00;
            --start-color: #00e676;
            --reset-color: #555555;
            --adjust-color: #424242;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 95vh;
            box-sizing: border-box;
            transition: background-color 0.3s ease;
        }

        .scoreboard-container {
            width: 100%;
            max-width: 1000px;
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 2px solid #333;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
        }
        .logo-placeholder {
            max-height: 70px;
            max-width: 250px;
            object-fit: contain;
            font-size: 1.6rem;
            font-weight: bold;
            color: #aaa;
            letter-spacing: 3px;
        }

        .clock-card {
            background: #0a0a0a;
            padding: 15px 10px;
            border-radius: 12px;
            border: 2px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .clock-card.match-card { border-left: 10px solid var(--match-color); }
        .clock-card.set-card { border-left: 10px solid var(--set-color); }

        .clock-label {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2px;
        }
        
        .match-label { color: var(--match-color); }
        .set-label { color: var(--set-color); }

        .time-display {
            font-family: monospace;
            font-size: clamp(4.5rem, 18vw, 11rem);
            font-weight: bold;
            line-height: 1;
            margin: 5px 0;
            text-shadow: 0 0 15px rgba(0,0,0,0.9);
            letter-spacing: -2px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            width: 100%;
            flex-wrap: wrap;
        }

        button {
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: all 0.15s ease;
            outline: none;
        }

        .btn-main {
            flex: 1;
            min-width: 140px;
            max-width: 300px;
            padding: 18px 20px;
            font-size: 1.4rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn-sub {
            padding: 8px 16px;
            font-size: 0.9rem;
            background-color: var(--reset-color);
            color: white;
        }
        .btn-sub:hover { background-color: #777; }

        .btn-adj {
            padding: 6px 12px;
            font-size: 0.85rem;
            background-color: var(--adjust-color);
            color: #fff;
            border: 1px solid #444;
        }
        .btn-adj:hover { background-color: #616161; }

        .btn-start { background-color: var(--start-color); color: #000; }
        .btn-start:hover { background-color: #00c853; transform: scale(1.02); }

        .btn-pause { background-color: var(--pause-color); color: #fff; }
        .btn-pause:hover { background-color: #d50000; transform: scale(1.02); }

        .btn-fullscreen {
            background-color: #673ab7;
            color: white;
            padding: 10px 20px;
            font-size: 1rem;
            margin-bottom: 5px;
        }
        .btn-fullscreen:hover { background-color: #7e57c2; }

        .master-controls {
            padding: 15px;
            background: #151515;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .status-banner {
            font-weight: bold;
            font-size: 1.3rem;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .config-panel {
            background: #151515;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .config-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 10px;
        }
        .config-section:last-child { border: none; padding-bottom: 0; }

        .config-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #aaa;
            font-weight: bold;
            min-width: 180px;
            text-align: left;
        }

        .config-input {
            width: 65px;
            background: #222;
            border: 2px solid #444;
            color: #fff;
            padding: 6px;
            font-size: 1rem;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }
        .config-input:focus { border-color: #03a9f4; outline: none; }

        .btn-apply {
            background-color: #0288d1;
            color: white;
            padding: 6px 14px;
            font-size: 0.9rem;
        }
        .btn-apply:hover { background-color: #03a9f4; }

        .solid-red-bg { background-color: #8b0000 !important; }

        @keyframes flash-yellow {
            0%, 100% { background-color: var(--bg-color); }
            50% { background-color: #bfa100; color: #000; }
        }
        .flash-match-expired { animation: flash-yellow 0.6s infinite; }

        @keyframes flash-dual-custom {
            0%, 100% { background-color: #8b0000; }
            50% { background-color: #bfa100; color: #000; }
        }
        .flash-both-expired { animation: flash-dual-custom 0.5s infinite; }
    </style>
</head>
<body>

    <div class="scoreboard-container" id="scoreboard">
        <div class="logo-container">
            <img class="logo-placeholder" id="logo-img" src="logo.png" alt="DODGEBALL TIMER">
        </div>
        <button class="btn-fullscreen" onclick="toggleFullscreen()">Toggle Fullscreen ⛶</button>
        
        <div class="clock-card match-card">
            <div class="clock-label match-label">Match Clock</div>
            <div class="time-display" id="match-display">20:00</div>
            <div class="btn-group">
                <button class="btn-adj" onclick="adjustTime('match', 60)">+1 Min</button>
                <button class="btn-adj" onclick="adjustTime('match', -60)">-1 Min</button>
                <button class="btn-adj" onclick="adjustTime('match', 5)">+5 Sec</button>
                <button class="btn-adj" onclick="adjustTime('match', -5)">-5 Sec</button>
                <button class="btn-sub" onclick="resetMatchClock()">Reset Match</button>
            </div>
        </div>

        <div class="clock-card set-card">
            <div class="clock-label set-label">Set Clock</div>
            <div class="time-display" id="set-display">03:00</div>
            <div class="btn-group">
                <button class="btn-adj" onclick="adjustTime('set', 60)">+1 Min</button>
                <button class="btn-adj" onclick="adjustTime('set', -60)">-1 Min</button>
                <button class="btn-adj" onclick="adjustTime('set', 5)">+5 Sec</button>
                <button class="btn-adj" onclick="adjustTime('set', -5)">-5 Sec</button>
                <button class="btn-sub" onclick="resetSetClock()">Reset Set</button>
            </div>
        </div>

        <div class="master-controls">
            <div class="btn-group">
                <button class="btn-main btn-start" id="start-btn" onclick="startTimers()">Start Play</button>
                <button class="btn-main btn-pause" id="pause-btn" onclick="pauseTimers()">Pause Play</button>
            </div>
            <div class="status-banner" id="status-text" style="color: #888;">Ready</div>
        </div>

        <div class="config-panel">
            <div class="config-section">
                <div class="config-title">Default Match Duration:</div>
                <input type="number" id="input-match-min" class="config-input" value="20" min="0" max="99">
                <span style="color:#aaa">Min</span>
                <input type="number" id="input-match-sec" class="config-input" value="0" min="0" max="59">
                <span style="color:#aaa">Sec</span>
                <button class="btn-apply" onclick="applyCustomMatchTime()">Apply</button>
            </div>
            <div class="config-section">
                <div class="config-title">Default Set Duration:</div>
                <input type="number" id="input-set-min" class="config-input" value="3" min="0" max="99">
                <span style="color:#aaa">Min</span>
                <input type="number" id="input-set-sec" class="config-input" value="0" min="0" max="59">
                <span style="color:#aaa">Sec</span>
                <button class="btn-apply" onclick="applyCustomSetTime()">Apply</button>
            </div>
        </div>
    </div>

    <script>
        let matchDefaultSeconds = 20 * 60; 
        let setDefaultSeconds = 3 * 60;    

        let matchTime = matchDefaultSeconds;
        let setTime = setDefaultSeconds;
        
        let isRunning = false;
        let countdownInterval = null;

        const matchDisplay = document.getElementById('match-display');
        const setDisplay = document.getElementById('set-display');
        const statusText = document.getElementById('status-text');
        const bodyNode = document.body;

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDisplays() {
            matchDisplay.textContent = formatTime(matchTime);
            setDisplay.textContent = formatTime(setTime);
            checkExpirations();
        }

        function adjustTime(clockType, amount) {
            if (clockType === 'match') {
                matchTime = Math.max(0, matchTime + amount);
            } else if (clockType === 'set') {
                setTime = Math.max(0, setTime + amount);
            }
            updateDisplays();
        }

        function applyCustomMatchTime() {
            const min = parseInt(document.getElementById('input-match-min').value) || 0;
            const sec = parseInt(document.getElementById('input-match-sec').value) || 0;
            matchDefaultSeconds = (min * 60) + Math.max(0, Math.min(59, sec));
            if (!isRunning) { matchTime = matchDefaultSeconds; updateDisplays(); }
        }

        function applyCustomSetTime() {
            const min = parseInt(document.getElementById('input-set-min').value) || 0;
            const sec = parseInt(document.getElementById('input-set-sec').value) || 0;
            setDefaultSeconds = (min * 60) + Math.max(0, Math.min(59, sec));
            if (!isRunning) { setTime = setDefaultSeconds; updateDisplays(); }
        }

        function startTimers() {
            if (isRunning) return;
            if (matchTime <= 0 && setTime <= 0) return;
            isRunning = true;
            statusText.textContent = "Live Play";
            statusText.style.color = "#00e676";
            countdownInterval = setInterval(() => {
                if (matchTime > 0) matchTime--;
                if (setTime > 0) setTime--;
                updateDisplays();
                if (matchTime === 0 && setTime === 0) { clearInterval(countdownInterval); isRunning = false; }
            }, 1000);
        }

        function pauseTimers() {
            if (!isRunning) return;
            clearInterval(countdownInterval);
            isRunning = false;
            statusText.textContent = "Play Paused";
            statusText.style.color = "#ff3d00";
        }

        function resetMatchClock() { matchTime = matchDefaultSeconds; updateDisplays(); }
        function resetSetClock() { setTime = setDefaultSeconds; updateDisplays(); }

        function checkExpirations() {
            bodyNode.classList.remove('flash-match-expired', 'solid-red-bg', 'flash-both-expired');
            if (matchTime === 0 && setTime === 0) { bodyNode.classList.add('flash-both-expired'); statusText.textContent = "Match & Set Expired!"; } 
            else if (matchTime === 0) { bodyNode.classList.add('flash-match-expired'); statusText.textContent = "Match Half Finished!"; } 
            else if (setTime === 0) { bodyNode.classList.add('solid-red-bg'); statusText.textContent = "Set Clock Over!"; }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => { alert(`Fullscreen failed: ${err.message}`); });
            } else { document.exitFullscreen(); }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed', err));
        }

        updateDisplays();
    </script>
</body>
</html>
